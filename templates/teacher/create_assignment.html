{% extends "base.html" %}
{% block content %}
<div class="card">
    <a href="{{ url_for('teacher_dashboard') }}" class="back-link">← 返回</a>
    <h2 class="mt-2">📝 布置新作业</h2>
    <form method="POST">
        <div class="form-group">
            <label>作业标题</label>
            <input type="text" name="title" required placeholder="例如：第三章课后练习" autocomplete="off">
        </div>
        <div class="form-group">
            <label>作业内容/要求</label>
            <textarea name="description" required placeholder="请输入作业的具体内容和要求..."></textarea>
        </div>
        <div class="form-group">
            <label>截止时间（可选）</label>
            <input type="datetime-local" name="deadline">
        </div>
        <button type="submit" class="btn btn-primary btn-block">发布作业</button>
    </form>
</div>
{% endblock %}
